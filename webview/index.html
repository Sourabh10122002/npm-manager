<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NPM Manager</title>
</head>
<body>
    <div class="app-container">
        <!-- Tabs Header -->
        <div class="tabs-header">
            <div id="tab-browse" class="tab-item active" onclick="switchTab('browse')">
                Browse
            </div>
            <div id="tab-installed" class="tab-item" onclick="switchTab('installed')">
                Installed
            </div>
            <div id="tab-updates" class="tab-item" onclick="switchTab('updates')">
                Updates
                <span id="update-badge" class="notification-badge" style="display: none;"></span>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Loading Bar -->
            <div id="loading-bar" class="loading-bar" style="display: none;">
                <div class="loading-progress"></div>
            </div>

            <!-- Sticky Search Bar (Only for Browse) -->
            <div id="browse-search" class="search-bar-sticky">
                <div class="search-input-wrapper">
                    <svg class="search-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="package-search-input" class="search-input" placeholder="Search packages..." autofocus>
                </div>
            </div>

            <!-- Updates Specific Header (Only for Updates) -->
            <div id="updates-header" class="search-bar-sticky" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="updates-info" class="section-title">0 updates found</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="action-button secondary" id="refresh-btn" onclick="checkUpdates()">
                            <svg width="14" height="14" viewBox="0 0 24 24" id="refresh-icon" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
                            </svg>
                            Refresh
                        </button>
                        <button id="update-all-btn" class="action-button primary" style="display: none;" onclick="updateAll()">
                             Update All
                        </button>
                    </div>
                </div>
            </div>

            <!-- Scrollable Package List -->
            <div id="package-list" class="package-list-scrollable">
                <!-- Data populated by JS -->
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
